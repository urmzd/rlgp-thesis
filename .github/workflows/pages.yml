name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends texlive-full

      - name: Compile PDF
        run: |
          latexmk -pdf -pdflatex="pdflatex -interaction=nonstopmode" thesis.tex

      - name: Convert to HTML
        run: |
          make4ht -u -c "" thesis.tex "mathjax,fn-in"

      - name: Prepare site
        run: |
          mkdir -p _site
          cp thesis.pdf _site/
          cp thesis.html _site/index.html
          cp -r assets _site/ 2>/dev/null || true
          # Copy any generated CSS/images from make4ht
          cp thesis*.css _site/ 2>/dev/null || true
          cp thesis*.png _site/ 2>/dev/null || true
          cp thesis*.svg _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
